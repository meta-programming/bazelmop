<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bazelmop | Deduplication Report</title>
    <style>
        /* GitHub Dark Theme Color Palette */
        :root {
            --color-bg-canvas: #0d1117;
            --color-bg-subtle: #161b22;
            --color-border-default: #30363d;
            --color-border-muted: #21262d;
            --color-fg-default: #c9d1d9;
            --color-fg-muted: #8b949e;
            --color-fg-accent: #58a6ff;
            --color-accent-bg: rgba(56, 139, 253, 0.1);
            --color-danger-fg: #f85149;
            --color-success-fg: #3fb950;
            --color-neutral-muted: rgba(110, 118, 129, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            background-color: var(--color-bg-canvas);
            color: var(--color-fg-default);
            margin: 0;
            padding: 24px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .container {
            max-width: 1012px;
            margin: 0 auto;
        }

        /* Top Header Bar */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--color-border-default);
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            color: var(--color-fg-default);
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .logo span {
            color: var(--color-fg-accent);
        }

        .status-badge {
            background-color: rgba(63, 185, 80, 0.15);
            color: var(--color-success-fg);
            border: 1px solid rgba(63, 185, 80, 0.3);
            border-radius: 2em;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .meta-info {
            text-align: right;
            font-size: 12px;
            color: var(--color-fg-muted);
        }

        #countdown {
            margin-top: 4px;
            font-weight: 500;
            color: var(--color-fg-accent);
        }

        /* GitHub Box Layout */
        .box {
            background-color: var(--color-bg-canvas);
            border: 1px solid var(--color-border-default);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .box-header {
            background-color: var(--color-bg-subtle);
            border-bottom: 1px solid var(--color-border-default);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .box-title {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .box-title svg {
            fill: var(--color-fg-muted);
        }

        .box-content {
            padding: 40px;
            background-color: var(--color-bg-canvas);
        }

        /* GitHub Markdown Rendering Styles */
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
            color: var(--color-fg-default);
        }

        .markdown-body h1 {
            font-size: 2em;
            border-bottom: 1px solid var(--color-border-muted);
            padding-bottom: 0.3em;
        }

        .markdown-body h2 {
            font-size: 1.5em;
            border-bottom: 1px solid var(--color-border-muted);
            padding-bottom: 0.3em;
        }

        .markdown-body h3 {
            font-size: 1.25em;
        }

        .markdown-body p {
            margin-top: 0;
            margin-bottom: 16px;
        }

        .markdown-body code {
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            font-size: 85%;
            background-color: rgba(110, 118, 129, 0.4);
            padding: 0.2em 0.4em;
            border-radius: 6px;
            margin: 0;
        }

        .markdown-body pre {
            margin-top: 0;
            margin-bottom: 16px;
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: var(--color-bg-subtle);
            border-radius: 6px;
            border: 1px solid var(--color-border-default);
        }

        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            margin: 0;
            font-size: 100%;
            word-break: normal;
            white-space: pre;
            color: var(--color-fg-default);
        }

        .markdown-body table {
            display: block;
            width: 100%;
            width: max-content;
            max-width: 100%;
            overflow: auto;
            margin-top: 0;
            margin-bottom: 16px;
            border-spacing: 0;
            border-collapse: collapse;
        }

        .markdown-body table th, .markdown-body table td {
            padding: 6px 13px;
            border: 1px solid var(--color-border-default);
        }

        .markdown-body table tr {
            background-color: var(--color-bg-canvas);
            border-top: 1px solid var(--color-border-default);
        }

        .markdown-body table tr:nth-child(2n) {
            background-color: var(--color-bg-subtle);
        }

        .markdown-body table th {
            font-weight: 600;
            background-color: #1f242c;
        }

        .markdown-body ul, .markdown-body ol {
            margin-top: 0;
            margin-bottom: 16px;
            padding-left: 2em;
        }

        .markdown-body li {
            margin-top: 0.25em;
        }

        .markdown-body hr {
            height: 0.25em;
            padding: 0;
            margin: 24px 0;
            background-color: var(--color-border-default);
            border: 0;
        }

        .markdown-body hr {
            height: 0.25em;
            padding: 0;
            margin: 24px 0;
            background-color: var(--color-border-default);
            border: 0;
        }

        .markdown-body blockquote {
            padding: 0 1em;
            color: var(--color-fg-muted);
            border-left: 0.25em solid var(--color-border-default);
            margin: 0 0 16px 0;
        }

        /* Alert Callouts */
        .markdown-body blockquote.alert-important {
            border-left-color: var(--color-fg-accent);
            background-color: var(--color-accent-bg);
            padding: 12px 16px;
            border-radius: 6px;
        }

        /* Footer styling */
        .footer {
            margin-top: 40px;
            border-top: 1px solid var(--color-border-default);
            padding-top: 16px;
            text-align: center;
            font-size: 12px;
            color: var(--color-fg-muted);
        }

        .footer a {
            color: var(--color-fg-accent);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Dashboard Header -->
        <div class="header">
            <div class="logo-section">
                <a href="/" class="logo">bazel<span>mop</span></a>
                <div class="status-badge" id="daemon-status">Daemon Active</div>
            </div>
            <div class="meta-info">
                <div id="last-updated">Last scan: Loading...</div>
                <div id="countdown">Next scan: Calculating...</div>
            </div>
        </div>

        <!-- GitHub File Box container -->
        <div class="box">
            <div class="box-header">
                <div class="box-title">
                    <svg aria-hidden="true" height="16" viewBox="0 0 16 16" version="1.1" width="16" data-view-component="true">
                        <path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l3.25 3.25c.329.329.513.773.513 1.237v9.25A1.75 1.75 0 0 1 13.586 16H3.75A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25 .25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.836a.25.25 0 0 0 .25-.25V5.5H10.25A1.75 1.75 0 0 1 8.5 3.75V1.5H3.75ZM9.75 1.5v2.25c0 .138.112.25.25.25h2.25L9.75 1.5Z"></path>
                    </svg>
                    report.md
                </div>
            </div>
            <div class="box-content markdown-body" id="report-view">
                <p>Loading latest deduplication report...</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            Powered by <a href="https://github.com/meta-programming/bazelmop" target="_blank">bazelmop</a> | Open Source Cache Deduplicator
        </div>
    </div>

    <!-- Pre-bundled marked.js library -->
    <script src="/assets/marked.min.js"></script>
    <script>
        let nextScanTime = null;

        // Custom blockquote parser to identify GFM Alert blocks
        const renderer = new marked.Renderer();
        const originalBlockquote = renderer.blockquote;
        renderer.blockquote = function(token) {
            let text = token.text;
            if (text.includes('[!IMPORTANT]') || text.includes('<strong>IMPORTANT</strong>')) {
                text = text.replace(/\[!IMPORTANT\]\s*/g, '');
                return `<blockquote class="alert-important">${text}</blockquote>`;
            }
            return originalBlockquote.call(this, token);
        };

        marked.setOptions({
            renderer: renderer,
            gfm: true,
            breaks: true
        });

        // Initialize Server-Sent Events listener
        function initEventSource() {
            const eventSource = new EventSource('/api/events');

            eventSource.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);

                    if (data.report) {
                        document.getElementById('report-view').innerHTML = marked.parse(data.report);
                    } else {
                        document.getElementById('report-view').innerHTML = '<p style="color: var(--color-fg-muted);">No reports generated yet. Scanning directories...</p>';
                    }

                    if (data.updated_at) {
                        const date = new Date(data.updated_at);
                        document.getElementById('last-updated').textContent = `Last scan: ${date.toLocaleTimeString()}`;
                    } else {
                        document.getElementById('last-updated').textContent = 'Last scan: Pending';
                    }

                    if (data.next_scan) {
                        nextScanTime = new Date(data.next_scan);
                    } else {
                        nextScanTime = null;
                    }
                } catch (err) {
                    console.error('Failed to parse SSE payload:', err);
                }
            };

            eventSource.onerror = function(err) {
                console.error('EventSource connection error, attempting reconnect...', err);
                document.getElementById('daemon-status').textContent = 'Disconnected';
                document.getElementById('daemon-status').style.backgroundColor = 'rgba(248, 81, 73, 0.15)';
                document.getElementById('daemon-status').style.color = 'var(--color-danger-fg)';
                document.getElementById('daemon-status').style.borderColor = 'rgba(248, 81, 73, 0.3)';
            };

            eventSource.onopen = function() {
                document.getElementById('daemon-status').textContent = 'Daemon Active';
                document.getElementById('daemon-status').style.backgroundColor = 'rgba(63, 185, 80, 0.15)';
                document.getElementById('daemon-status').style.color = 'var(--color-success-fg)';
                document.getElementById('daemon-status').style.borderColor = 'rgba(63, 185, 80, 0.3)';
            };
        }

        // Ticking countdown handler
        function updateCountdown() {
            const countdownEl = document.getElementById('countdown');
            if (!nextScanTime) {
                countdownEl.textContent = 'Next scan: Calculating...';
                return;
            }

            const now = new Date();
            const diff = nextScanTime - now;

            if (diff <= 0) {
                countdownEl.textContent = 'Next scan: Running...';
                return;
            }

            const hours = Math.floor(diff / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);

            let timeStr = '';
            if (hours > 0) {
                timeStr += `${hours}h `;
            }
            if (minutes > 0 || hours > 0) {
                timeStr += `${minutes}m `;
            }
            timeStr += `${seconds}s`;

            countdownEl.textContent = `Next scan in: ${timeStr}`;
        }

        // Start connection & timers
        initEventSource();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
