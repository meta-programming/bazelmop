<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bazelmop | Deduplication Report</title>
    <style>
        /* CSS Variables for Dark Theme (Default) */
        :root {
            --color-bg-canvas: #0d1117;
            --color-bg-subtle: #161b22;
            --color-border-default: #30363d;
            --color-border-muted: #21262d;
            --color-fg-default: #c9d1d9;
            --color-fg-muted: #8b949e;
            --color-fg-accent: #58a6ff;
            --color-accent-bg: rgba(56, 139, 253, 0.1);
            --color-danger-fg: #f85149;
            --color-success-fg: #3fb950;
            --color-neutral-muted: rgba(110, 118, 129, 0.4);
        }

        /* CSS Variables for Light Theme */
        body[data-theme="light"] {
            --color-bg-canvas: #ffffff;
            --color-bg-subtle: #f6f8fa;
            --color-border-default: #d0d7de;
            --color-border-muted: #d8dee4;
            --color-fg-default: #24292f;
            --color-fg-muted: #57606a;
            --color-fg-accent: #0969da;
            --color-accent-bg: rgba(9, 105, 218, 0.1);
            --color-danger-fg: #cf222e;
            --color-success-fg: #1a7f37;
            --color-neutral-muted: rgba(175, 184, 193, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            background-color: var(--color-bg-canvas);
            color: var(--color-fg-default);
            margin: 0;
            padding: 24px;
            line-height: 1.5;
            word-wrap: break-word;
            transition: background-color 0.2s, color 0.2s;
        }

        .container {
            max-width: 1012px;
            margin: 0 auto;
        }

        /* Top Header Bar */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--color-border-default);
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            color: var(--color-fg-default);
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .logo span {
            color: var(--color-fg-accent);
        }

        .status-badge {
            background-color: rgba(63, 185, 80, 0.15);
            color: var(--color-success-fg);
            border: 1px solid rgba(63, 185, 80, 0.3);
            border-radius: 2em;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 500;
            transition: background-color 0.2s, color 0.2s;
        }

        .meta-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: 12px;
            color: var(--color-fg-muted);
        }

        #countdown {
            margin-top: 4px;
            font-weight: 500;
            color: var(--color-fg-accent);
        }

        /* GitHub Box Layout */
        .box {
            background-color: var(--color-bg-canvas);
            border: 1px solid var(--color-border-default);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .box-header {
            background-color: var(--color-bg-subtle);
            border-bottom: 1px solid var(--color-border-default);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .box-title {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .box-title svg {
            fill: var(--color-fg-muted);
        }

        .theme-toggle-btn {
            background-color: var(--color-bg-canvas);
            border: 1px solid var(--color-border-default);
            color: var(--color-fg-default);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .theme-toggle-btn:hover {
            background-color: var(--color-bg-subtle);
            border-color: var(--color-fg-muted);
        }

        .box-content {
            padding: 40px;
            background-color: var(--color-bg-canvas);
        }

        /* GitHub Markdown Rendering Styles */
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
            color: var(--color-fg-default);
        }

        .markdown-body h1 {
            font-size: 2em;
            border-bottom: 1px solid var(--color-border-muted);
            padding-bottom: 0.3em;
        }

        .markdown-body h2 {
            font-size: 1.5em;
            border-bottom: 1px solid var(--color-border-muted);
            padding-bottom: 0.3em;
        }

        .markdown-body h3 {
            font-size: 1.25em;
        }

        .markdown-body p {
            margin-top: 0;
            margin-bottom: 16px;
        }

        .markdown-body code {
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            font-size: 85%;
            background-color: var(--color-neutral-muted);
            padding: 0.2em 0.4em;
            border-radius: 6px;
            margin: 0;
        }

        .markdown-body pre {
            margin-top: 0;
            margin-bottom: 16px;
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: var(--color-bg-subtle);
            border-radius: 6px;
            border: 1px solid var(--color-border-default);
        }

        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            margin: 0;
            font-size: 100%;
            word-break: normal;
            white-space: pre;
            color: var(--color-fg-default);
        }

        .markdown-body table {
            display: block;
            width: 100%;
            width: max-content;
            max-width: 100%;
            overflow: auto;
            margin-top: 0;
            margin-bottom: 16px;
            border-spacing: 0;
            border-collapse: collapse;
        }

        .markdown-body table th, .markdown-body table td {
            padding: 6px 13px;
            border: 1px solid var(--color-border-default);
        }

        .markdown-body table tr {
            background-color: var(--color-bg-canvas);
            border-top: 1px solid var(--color-border-default);
        }

        .markdown-body table tr:nth-child(2n) {
            background-color: var(--color-bg-subtle);
        }

        .markdown-body table th {
            font-weight: 600;
            background-color: var(--color-bg-subtle);
        }

        body[data-theme="light"] .markdown-body table th {
            background-color: #eaeef2;
        }

        .markdown-body ul, .markdown-body ol {
            margin-top: 0;
            margin-bottom: 16px;
            padding-left: 2em;
        }

        .markdown-body li {
            margin-top: 0.25em;
        }

        .markdown-body hr {
            height: 0.25em;
            padding: 0;
            margin: 24px 0;
            background-color: var(--color-border-default);
            border: 0;
        }

        .markdown-body blockquote {
            padding: 0 1em;
            color: var(--color-fg-muted);
            border-left: 0.25em solid var(--color-border-default);
            margin: 0 0 16px 0;
        }

        /* Alert Callouts */
        .markdown-body blockquote.alert-important {
            border-left-color: var(--color-fg-accent);
            background-color: var(--color-accent-bg);
            padding: 12px 16px;
            border-radius: 6px;
        }

        /* Progress loader styling */
        .progress-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 60px 0;
            color: var(--color-fg-muted);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 4px solid var(--color-border-default);
            border-top-color: var(--color-fg-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer styling */
        .footer {
            margin-top: 40px;
            border-top: 1px solid var(--color-border-default);
            padding-top: 16px;
            text-align: center;
            font-size: 12px;
            color: var(--color-fg-muted);
        }

        .footer a {
            color: var(--color-fg-accent);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Dashboard Header -->
        <div class="header">
            <div class="logo-section">
                <a href="/" class="logo">bazel<span>mop</span></a>
                <div class="status-badge" id="daemon-status">Daemon Active</div>
            </div>
            <div class="meta-info">
                <div id="last-updated">Last scan: Loading...</div>
                <div id="countdown">Next scan: Calculating...</div>
            </div>
        </div>

        <!-- GitHub File Box container -->
        <div class="box">
            <div class="box-header">
                <div class="box-title">
                    <svg aria-hidden="true" height="16" viewBox="0 0 16 16" version="1.1" width="16" data-view-component="true">
                        <path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l3.25 3.25c.329.329.513.773.513 1.237v9.25A1.75 1.75 0 0 1 13.586 16H3.75A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25 .25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.836a.25.25 0 0 0 .25-.25V5.5H10.25A1.75 1.75 0 0 1 8.5 3.75V1.5H3.75ZM9.75 1.5v2.25c0 .138.112.25.25.25h2.25L9.75 1.5Z"></path>
                    </svg>
                    report.md
                </div>
                <button class="theme-toggle-btn" id="theme-toggle">☀️ Light Mode</button>
            </div>
            <div class="box-content markdown-body" id="report-view">
                <div class="progress-box">
                    <div class="spinner"></div>
                    <div id="progress-status">Loading latest deduplication report...</div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            Powered by <a href="https://github.com/meta-programming/bazelmop" target="_blank">bazelmop</a> | Open Source Bazel Cache Deduplicator
        </div>
    </div>

    <!-- Pre-bundled marked.js library -->
    <script src="/assets/marked.min.js"></script>
    <script>
        let nextScanTime = null;

        // Custom blockquote parser to identify GFM Alert blocks
        const renderer = new marked.Renderer();
        const originalBlockquote = renderer.blockquote;
        renderer.blockquote = function(token) {
            let text = token.text;
            if (text.includes('[!IMPORTANT]') || text.includes('<strong>IMPORTANT</strong>')) {
                text = text.replace(/\[!IMPORTANT\]\s*/g, '');
                return `<blockquote class="alert-important">${text}</blockquote>`;
            }
            return originalBlockquote.call(this, token);
        };

        marked.setOptions({
            renderer: renderer,
            gfm: true,
            breaks: true
        });

        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme') || 'dark';
        document.body.setAttribute('data-theme', currentTheme);
        updateThemeButton(currentTheme);

        themeToggle.addEventListener('click', () => {
            const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            updateThemeButton(theme);
        });

        function updateThemeButton(theme) {
            themeToggle.textContent = theme === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode';
        }

        // Initialize Server-Sent Events listener
        function initEventSource() {
            const eventSource = new EventSource('/api/events');

            eventSource.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);

                    // Update report or show active scanning progress
                    if (data.report) {
                        document.getElementById('report-view').innerHTML = marked.parse(data.report);
                    } else if (data.status && data.status !== 'Idle') {
                        document.getElementById('report-view').innerHTML = `
                            <div class="progress-box">
                                <div class="spinner"></div>
                                <div id="progress-status">${data.status}</div>
                            </div>
                        `;
                    } else {
                        document.getElementById('report-view').innerHTML = '<p style="color: var(--color-fg-muted);">No reports generated yet. Scanning directories...</p>';
                    }

                    // Update Status Badge with active status
                    if (data.status) {
                        const badge = document.getElementById('daemon-status');
                        badge.textContent = `Daemon: ${data.status}`;
                        if (data.status !== 'Idle') {
                            badge.style.backgroundColor = 'rgba(56, 139, 253, 0.15)';
                            badge.style.color = 'var(--color-fg-accent)';
                            badge.style.borderColor = 'rgba(56, 139, 253, 0.3)';
                        } else {
                            badge.style.backgroundColor = 'rgba(63, 185, 80, 0.15)';
                            badge.style.color = 'var(--color-success-fg)';
                            badge.style.borderColor = 'rgba(63, 185, 80, 0.3)';
                        }
                    }

                    if (data.updated_at) {
                        const date = new Date(data.updated_at);
                        document.getElementById('last-updated').textContent = `Last scan: ${date.toLocaleTimeString()}`;
                    } else {
                        document.getElementById('last-updated').textContent = 'Last scan: Pending';
                    }

                    if (data.next_scan) {
                        nextScanTime = new Date(data.next_scan);
                    } else {
                        nextScanTime = null;
                    }
                } catch (err) {
                    console.error('Failed to parse SSE payload:', err);
                }
            };

            eventSource.onerror = function(err) {
                console.error('EventSource connection error, attempting reconnect...', err);
                const badge = document.getElementById('daemon-status');
                badge.textContent = 'Disconnected';
                badge.style.backgroundColor = 'rgba(248, 81, 73, 0.15)';
                badge.style.color = 'var(--color-danger-fg)';
                badge.style.borderColor = 'rgba(248, 81, 73, 0.3)';
            };

            eventSource.onopen = function() {
                const badge = document.getElementById('daemon-status');
                badge.textContent = 'Daemon Active';
                badge.style.backgroundColor = 'rgba(63, 185, 80, 0.15)';
                badge.style.color = 'var(--color-success-fg)';
                badge.style.borderColor = 'rgba(63, 185, 80, 0.3)';
            };
        }

        // Ticking countdown handler
        function updateCountdown() {
            const countdownEl = document.getElementById('countdown');
            if (!nextScanTime) {
                countdownEl.textContent = 'Next scan: Calculating...';
                return;
            }

            const now = new Date();
            const diff = nextScanTime - now;

            if (diff <= 0) {
                countdownEl.textContent = 'Next scan: Running...';
                return;
            }

            const hours = Math.floor(diff / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);

            let timeStr = '';
            if (hours > 0) {
                timeStr += `${hours}h `;
            }
            if (minutes > 0 || hours > 0) {
                timeStr += `${minutes}m `;
            }
            timeStr += `${seconds}s`;

            countdownEl.textContent = `Next scan in: ${timeStr}`;
        }

        // Start connection & timers
        initEventSource();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
